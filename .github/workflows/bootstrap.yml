name: Bootstrap repository

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  expand-project:
    if: ${{ hashFiles('.bootstrap/pynetlab.part-*') != '' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Expand project archive
        shell: bash
        run: |
          set -Eeuo pipefail
          cat .bootstrap/pynetlab.part-* | base64 --decode > /tmp/PyNetLab.tar.gz
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/PyNetLab.tar.gz -C .
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: publish Linux network internals learning lab'
          git push origin HEAD:main
